name: CodeQL

"on":
  pull_request:
    branches: [main]
    paths:
      - "SwiftMac/**"
      - "SwiftMacHelper/**"
      - "SwiftMacTests/**"
      - "SwiftMacUITests/**"
      - "project.yml"
      - ".github/workflows/codeql.yml"
  workflow_dispatch:
  schedule:
    - cron: "22 2 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Select installed Xcode
        run: |
          shopt -s nullglob
          xcode_dirs=(/Applications/Xcode*.app/Contents/Developer)
          if [ ${#xcode_dirs[@]} -eq 0 ]; then
            echo "No Xcode installation found under /Applications"
            exit 1
          fi

          last_index=$((${#xcode_dirs[@]} - 1))
          sudo xcode-select -switch "${xcode_dirs[$last_index]}"
          xcodebuild -version

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      - name: Build for CodeQL
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            if command -v brew >/dev/null 2>&1; then
              arch -arm64 brew install xcodegen
            else
              echo "xcodegen is required to generate SwiftMac.xcodeproj"
              exit 1
            fi
          fi

          xcodegen generate

          xcodebuild \
            -project SwiftMac.xcodeproj \
            -target SwiftMac \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
