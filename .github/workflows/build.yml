name: Build & Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select installed Xcode
        run: |
          shopt -s nullglob
          xcode_dirs=(/Applications/Xcode*.app/Contents/Developer)
          if [ ${#xcode_dirs[@]} -eq 0 ]; then
            echo "No Xcode installation found under /Applications"
            exit 1
          fi

          last_index=$((${#xcode_dirs[@]} - 1))
          sudo xcode-select -switch "${xcode_dirs[$last_index]}"
          xcodebuild -version

      - name: Smoke test
        run: bash ./smoke-test-macos.sh

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: build/smoke-logs/
          if-no-files-found: ignore

  release:
    runs-on: macos-14
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Select installed Xcode
        run: |
          shopt -s nullglob
          xcode_dirs=(/Applications/Xcode*.app/Contents/Developer)
          if [ ${#xcode_dirs[@]} -eq 0 ]; then
            echo "No Xcode installation found under /Applications"
            exit 1
          fi

          last_index=$((${#xcode_dirs[@]} - 1))
          sudo xcode-select -switch "${xcode_dirs[$last_index]}"
          xcodebuild -version

      - name: Generate project
        run: bash ./setup.sh

      - name: Archive
        run: |
          xcodebuild \
            -project SwiftMac.xcodeproj \
            -scheme SwiftMac \
            -configuration Release \
            -archivePath SwiftMac.xcarchive \
            archive

      - name: Patch ExportOptions Team ID
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_TEAM_ID}" ]; then
            echo "Missing APPLE_TEAM_ID secret."
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Set :teamID ${APPLE_TEAM_ID}" ExportOptions.plist

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath SwiftMac.xcarchive \
            -exportPath Export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize Package
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          if [ -z "${APP_STORE_CONNECT_KEY_ID}" ] || [ -z "${APP_STORE_CONNECT_ISSUER_ID}" ] || [ -z "${APP_STORE_CONNECT_PRIVATE_KEY}" ]; then
            echo "Missing notarization secrets. Set APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_PRIVATE_KEY."
            exit 1
          fi

          key_file="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "${APP_STORE_CONNECT_PRIVATE_KEY}" > "$key_file"

          xcrun notarytool submit Export/SwiftMac.pkg \
            --key "$key_file" \
            --key-id "${APP_STORE_CONNECT_KEY_ID}" \
            --issuer "${APP_STORE_CONNECT_ISSUER_ID}" \
            --wait

          xcrun stapler staple Export/SwiftMac.pkg
