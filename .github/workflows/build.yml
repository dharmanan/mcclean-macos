name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select installed Xcode
        run: |
          shopt -s nullglob
          xcode_dirs=(/Applications/Xcode*.app/Contents/Developer)
          if [ ${#xcode_dirs[@]} -eq 0 ]; then
            echo "No Xcode installation found under /Applications"
            exit 1
          fi

          last_index=$((${#xcode_dirs[@]} - 1))
          sudo xcode-select -switch "${xcode_dirs[$last_index]}"
          xcodebuild -version

      - name: Smoke test
        run: bash ./smoke-test-macos.sh

  release:
    runs-on: macos-14
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Select installed Xcode
        run: |
          shopt -s nullglob
          xcode_dirs=(/Applications/Xcode*.app/Contents/Developer)
          if [ ${#xcode_dirs[@]} -eq 0 ]; then
            echo "No Xcode installation found under /Applications"
            exit 1
          fi

          last_index=$((${#xcode_dirs[@]} - 1))
          sudo xcode-select -switch "${xcode_dirs[$last_index]}"
          xcodebuild -version

      - name: Generate project
        run: bash ./setup.sh

      - name: Archive
        run: |
          xcodebuild \
            -project SwiftMac.xcodeproj \
            -scheme SwiftMac \
            -configuration Release \
            -archivePath SwiftMac.xcarchive \
            archive

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath SwiftMac.xcarchive \
            -exportPath Export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file Export/SwiftMac.pkg \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
