name: SwiftMac
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  swift: "6.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  SwiftMac:
    type: application
    platform: macOS
    sources:
      - path: SwiftMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.swiftmac
        INFOPLIST_FILE: SwiftMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SwiftMac/Resources/SwiftMac.entitlements
        ENABLE_PREVIEWS: YES
    dependencies: []

  SwiftMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SwiftMacTests
    dependencies:
      - target: SwiftMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.swiftmactests

    SwiftMacUITests:
        type: bundle.ui-testing
        platform: macOS
        sources:
            - path: SwiftMacUITests
        dependencies:
            - target: SwiftMac
        settings:
            base:
                PRODUCT_BUNDLE_IDENTIFIER: com.yourname.swiftmacuitests

    SwiftMacHelper:
        type: xpc-service
        platform: macOS
        sources:
            - path: SwiftMacHelper
        settings:
            base:
                PRODUCT_BUNDLE_IDENTIFIER: com.yourname.swiftmachelper
